plugins {
    id 'com.android.library'
}

android {
    namespace 'com.orange.playerlibrary'
    compileSdk 36

    defaultConfig {
        minSdk 21
        targetSdk 36

        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.1'
    
    // GSYVideoPlayer 核心依赖
    api 'io.github.carguo:gsyvideoplayer:11.3.0'
    
    // 是否需要ExoPlayer模式
    implementation 'io.github.carguo:gsyvideoplayer-exo2:11.3.0'
    
    // 是否需要AliPlayer模式 - 排除自带的阿里云SDK，使用旧版本免授权
    implementation ('io.github.carguo:gsyvideoplayer-aliplay:11.3.0') {
        exclude group: 'com.aliyun.sdk.android', module: 'AliyunPlayer'
        exclude group: 'com.alivc.conan', module: 'AlivcConan'
    }
    // 阿里云播放器 5.3.0 免授权版本（5.4.x 开始需要 License）
    implementation 'com.aliyun.sdk.android:AliyunPlayer:5.4.7.1-full'
    
    // Glide 图片加载库（用于缩略图加载）
    implementation 'com.github.bumptech.glide:glide:4.16.0'
    annotationProcessor 'com.github.bumptech.glide:compiler:4.16.0'
    // 弹幕库 - 使用 bilibili 官方仓库
    implementation 'com.github.bilibili:DanmakuFlameMaster:0.9.25'
    
    // DLNA 投屏库 (可选依赖 - 需要在 app 模块中添加)
    // 如需启用投屏功能，请在 app/build.gradle 中添加:
    // implementation 'com.github.yanbo469:VideoDlnaScreen:master-SNAPSHOT'
    
    // 测试依赖
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
